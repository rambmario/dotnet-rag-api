<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Client -->
<rect x="20" y="170" width="90" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="65" y="196" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Client</text>
<text x="65" y="213" text-anchor="middle" font-size="12" fill="#5F5E5A">POST /api/ask</text>

<!-- Arrow client -> .NET -->
<line x1="110" y1="198" x2="158" y2="198" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="134" y="190" text-anchor="middle" font-size="12" fill="#5F5E5A">question</text>

<!-- .NET API box -->
<rect x="160" y="130" width="180" height="136" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="250" y="158" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">.NET 8 API</text>
<text x="250" y="176" text-anchor="middle" font-size="12" fill="#185FA5">Clean Architecture</text>
<rect x="178" y="192" width="144" height="30" rx="6" fill="none" stroke="#85B7EB" stroke-width="0.5"/>
<text x="250" y="211" text-anchor="middle" font-size="12" fill="#185FA5">Domain · App · Infra</text>
<rect x="178" y="228" width="144" height="26" rx="6" fill="none" stroke="#85B7EB" stroke-width="0.5"/>
<text x="250" y="244" text-anchor="middle" font-size="12" fill="#185FA5">xUnit tests</text>

<!-- Arrow .NET -> Python -->
<line x1="340" y1="198" x2="388" y2="198" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="364" y="188" text-anchor="middle" font-size="12" fill="#5F5E5A">HTTP</text>
<text x="364" y="210" text-anchor="middle" font-size="12" fill="#5F5E5A">POST /rag/ask</text>

<!-- Python RAG box -->
<rect x="390" y="130" width="175" height="136" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="477" y="158" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Python RAG</text>
<text x="477" y="176" text-anchor="middle" font-size="12" fill="#0F6E56">FastAPI · port 8000</text>
<rect x="408" y="192" width="139" height="30" rx="6" fill="none" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="477" y="211" text-anchor="middle" font-size="12" fill="#0F6E56">conocimiento.txt chunks</text>
<rect x="408" y="228" width="139" height="26" rx="6" fill="none" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="477" y="244" text-anchor="middle" font-size="12" fill="#0F6E56">OpenAI SDK</text>

<!-- Arrow Python -> OpenAI -->
<line x1="565" y1="185" x2="618" y2="140" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- OpenAI box -->
<rect x="580" y="80" width="80" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="620" y="103" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">OpenAI</text>
<text x="620" y="120" text-anchor="middle" font-size="12" fill="#854F0B">LLM API</text>

<!-- Arrow OpenAI -> Python (return) -->
<line x1="618" y1="132" x2="567" y2="185" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arrow .NET -> SQL -->
<line x1="250" y1="266" x2="250" y2="314" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="264" y="294" font-size="12" fill="#5F5E5A">log</text>

<!-- SQL Server box -->
<rect x="160" y="316" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="250" y="340" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">SQL Server</text>
<text x="250" y="357" text-anchor="middle" font-size="12" fill="#5F5E5A">Consultation logs</text>

<!-- Arrow SQL -> .NET (GET logs) -->
<line x1="340" y1="344" x2="388" y2="370" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="390" y="385" font-size="12" fill="#5F5E5A">GET /api/logs</text>

<!-- Flow summary -->
<text x="340" y="28" text-anchor="middle" font-size="12" fill="#5F5E5A">① Client asks  →  ② .NET routes  →  ③ Python retrieves context  →  ④ OpenAI answers  →  ⑤ .NET logs to SQL</text>
</svg>
